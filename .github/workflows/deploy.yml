name: Deploy Rekognition Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate Lambda Python
        run: python -m py_compile src/app.py src/kyc_handler.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package Lambda function
        run: |
          cd src
          zip -r ../lambda_function.zip .

      - name: Deploy Lambda - ImageAnalysisHandler
        run: |
          aws lambda update-function-code \
            --function-name ImageAnalysisHandler \
            --zip-file fileb://lambda_function.zip

      - name: Deploy Lambda - KYCVerificationHandler
        run: |
          aws lambda update-function-code \
            --function-name KYCVerificationHandler \
            --zip-file fileb://lambda_function.zip

      - name: Deploy frontend to S3
        run: |
          aws s3 cp frontend/index.html s3://rekkyc-frontend/index.html \
            --content-type "text/html" \
            --cache-control "no-cache"

      - name: Deployment complete
        run: echo "All resources deployed successfully."
